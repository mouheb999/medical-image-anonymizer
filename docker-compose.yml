version: '3.8'

services:
  anonymizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: medical-anonymizer:latest
    container_name: medical-anonymizer
    
    # Volume mounts for input/output
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      # Optional: Mount models cache to avoid re-downloading
      - ./models_cache:/root/.cache
    
    # Environment variables (already set in Dockerfile, but can override here)
    environment:
      - FLAGS_use_mkldnn=0
      - FLAGS_use_pir_api=0
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - KMP_DUPLICATE_LIB_OK=TRUE
      - PYTHONUNBUFFERED=1
    
    # Resource limits (optional, adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
    
    # Keep container running for interactive use (optional)
    # stdin_open: true
    # tty: true

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/medical_anonymizer
      - FASTAPI_URL=http://anonymizer:8000
      - JWT_SECRET=change_this_in_production
      - JWT_EXPIRE=7d
      - NODE_ENV=production
    depends_on:
      - mongodb
      - anonymizer
    volumes:
      - ./backend:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: client
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  minio_data:
  mongodb_data:
